# Promtail config for PRODUCTFC — 로그 수집 후 Loki로 전송
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: productfc
    static_configs:
      - targets:
          - localhost
        labels:
          job: productfc
          __path__: /var/log/productfc/*.log

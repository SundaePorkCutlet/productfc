basePath: /
definitions:
  models.Product:
    properties:
      category:
        $ref: '#/definitions/models.ProductCategory'
      category_id:
        type: integer
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
    type: object
  models.ProductCategory:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.SearchProductResponse:
    properties:
      nextPageUrl:
        type: string
      page:
        type: integer
      pageSize:
        type: integer
      products:
        items:
          $ref: '#/definitions/models.Product'
        type: array
      totalCount:
        type: integer
      totalPages:
        type: integer
    type: object
host: localhost:28081
info:
  contact: {}
  description: Product catalog, categories, and inventory for Go Commerce.
  title: PRODUCTFC API
  version: "1.0"
paths:
  /api/v1/product-categories:
    post:
      consumes:
      - application/json
      description: 새로운 상품 카테고리를 생성합니다.
      parameters:
      - description: 카테고리 생성 요청
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ProductCategory'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ProductCategory'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 카테고리 생성
      tags:
      - PRODUCT
  /api/v1/product-categories/{id}:
    delete:
      description: 카테고리 ID에 해당하는 카테고리를 삭제합니다.
      parameters:
      - description: 카테고리 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 카테고리 삭제
      tags:
      - PRODUCT
    put:
      consumes:
      - application/json
      description: 카테고리 ID에 해당하는 카테고리 정보를 수정합니다.
      parameters:
      - description: 카테고리 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 카테고리 수정 요청
        in: body
        name: body
        required: true
